<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiếng Việt — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f; --surface: #181819; --surface2: #222224; --border: #2e2e30;
    --accent: #d4a853; --accent2: #c17d3c; --text: #f0ede8;
    --text-muted: #7a7875; --text-soft: #b0ada8; --viet: #e8c97a; --fr: #a8c4e8; --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(212,168,83,0.06) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(168,196,232,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 40px 24px 80px; }
  header { text-align: center; margin-bottom: 48px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 48px); font-weight: 700; color: var(--text); line-height: 1.1; }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle { margin-top: 10px; font-size: 14px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.02em; }
  .sync-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; font-size: 12px; color: var(--text-muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
  .sync-dot.ok { background: #7ae8a0; }
  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.error { background: #e87a7a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .nav-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px; margin-bottom: 40px; width: fit-content; margin-left: auto; margin-right: auto; }
  .nav-tab { padding: 9px 22px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .nav-tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .view { display: none; } .view.active { display: block; }
  .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
  .toggle-btn { padding: 9px 20px; border-radius: 100px; border: 1.5px solid var(--border); background: transparent; color: var(--text-soft); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 600; }
  .toggle-btn.sub { font-size: 12px; padding: 7px 16px; border-style: dashed; }
  .toggle-btn.sub.active { background: rgba(212,168,83,0.15); color: var(--accent); border-style: solid; }
  .cat-breadcrumb { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 12px; font-size: 12px; color: var(--text-muted); min-height: 20px; }
  .cat-breadcrumb span { color: var(--accent); font-weight: 500; }
  .stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 36px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 2px; }
  .stat-divider { width: 1px; background: var(--border); align-self: stretch; }
  .progress-wrap { margin-bottom: 40px; }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width 0.5s ease; }
  .progress-text { text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .card-area { perspective: 1200px; margin-bottom: 32px; }
  .card { position: relative; width: 100%; min-height: 320px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 40px; transition: border-color 0.2s; }
  .card-face:hover { border-color: rgba(212,168,83,0.3); }
  .card-back { transform: rotateY(180deg); background: var(--surface2); }
  .card-face::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; background: radial-gradient(circle at top right, rgba(212,168,83,0.08), transparent 70%); border-radius: 0 var(--radius) 0 0; }
  .card-lang-badge { position: absolute; top: 20px; left: 24px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; padding: 4px 10px; border-radius: 100px; border: 1px solid; }
  .badge-viet { color: var(--viet); border-color: rgba(232,201,122,0.25); background: rgba(232,201,122,0.06); }
  .badge-fr { color: var(--fr); border-color: rgba(168,196,232,0.25); background: rgba(168,196,232,0.06); }
  .card-word { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 42px); font-weight: 700; text-align: center; line-height: 1.2; margin-bottom: 12px; }
  .card-front .card-word { color: var(--viet); } .card-back .card-word { color: var(--fr); }
  .card-romanization { font-size: 15px; color: var(--text-muted); font-style: italic; margin-bottom: 8px; font-family: 'Playfair Display', serif; }
  .card-category { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .card-hint { position: absolute; bottom: 20px; font-size: 11px; color: var(--text-muted); }
  .audio-btn { margin-top: 20px; display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-soft); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .audio-btn:hover, .audio-btn.playing { border-color: var(--accent); color: var(--accent); background: rgba(212,168,83,0.08); }
  .audio-btn svg { width: 14px; height: 14px; fill: currentColor; }
  .actions { display: flex; gap: 12px; justify-content: center; margin-bottom: 48px; }
  .btn { flex: 1; max-width: 180px; padding: 14px 24px; border-radius: var(--radius); border: 1.5px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-wrong { color: #e87a7a; border-color: rgba(232,122,122,0.3); } .btn-wrong:hover { background: rgba(232,122,122,0.1); border-color: #e87a7a; }
  .btn-correct { color: #7ae8a0; border-color: rgba(122,232,160,0.3); } .btn-correct:hover { background: rgba(122,232,160,0.1); border-color: #7ae8a0; }
  .btn-skip { color: var(--text-muted); border-color: var(--border); max-width: 100px; }
  .section-sep { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .section-sep span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); white-space: nowrap; }
  .sep-line { flex: 1; height: 1px; background: var(--border); }
  .add-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 32px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .form-group input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--accent); }
  .cat-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .cat-pill { padding: 7px 14px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
  .cat-pill.selected { background: rgba(212,168,83,0.12); color: var(--accent); border-color: var(--accent); }
  .form-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
  .audio-upload-label { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 10px; border: 1px dashed var(--border); color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .audio-upload-label:hover { border-color: var(--accent); color: var(--accent); }
  .audio-upload-label svg { width: 14px; height: 14px; fill: currentColor; }
  #audioFileInput { display: none; }
  .audio-filename { font-size: 12px; color: var(--text-soft); font-style: italic; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-add { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #0e0e0f; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn-add:hover { opacity: 0.9; }
  .word-list { display: flex; flex-direction: column; gap: 8px; }
  .word-item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; transition: border-color 0.2s; }
  .word-item:hover { border-color: rgba(212,168,83,0.2); }
  .word-viet { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--viet); min-width: 120px; }
  .word-fr { font-size: 14px; color: var(--text-soft); flex: 1; }
  .word-cat { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); padding: 3px 8px; border: 1px solid var(--border); border-radius: 100px; white-space: nowrap; }
  .word-actions { display: flex; gap: 8px; }
  .word-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 6px; transition: color 0.2s; display: flex; align-items: center; }
  .word-btn:hover { color: var(--accent); } .word-btn.delete:hover { color: #e87a7a; }
  .word-btn svg { width: 14px; height: 14px; fill: currentColor; }
  .cat-manager { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; }
  .cat-tree { display: flex; flex-direction: column; gap: 12px; }
  .cat-main-row { display: flex; align-items: center; gap: 10px; }
  .cat-main-label { font-size: 13px; font-weight: 600; color: var(--accent); min-width: 100px; text-transform: capitalize; }
  .cat-subs { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
  .sub-tag { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface2); font-size: 12px; color: var(--text-soft); }
  .sub-tag button { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; padding: 0; transition: color 0.2s; }
  .sub-tag button:hover { color: #e87a7a; }
  .add-sub-inline { display: flex; align-items: center; gap: 6px; }
  .add-sub-inline input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; width: 130px; transition: border-color 0.2s; }
  .add-sub-inline input:focus { border-color: var(--accent); }
  .add-sub-inline button { padding: 5px 12px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .loading-screen { text-align: center; padding: 80px 40px; }
  .loading-screen p { color: var(--text-muted); font-size: 14px; margin-top: 16px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-card { text-align: center; padding: 60px 40px; color: var(--text-muted); }
  .empty-card p { font-size: 14px; line-height: 1.6; }
  .completed { text-align: center; padding: 80px 40px; }
  .completed h2 { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--accent); margin-bottom: 12px; }
  .completed p { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; }
  .btn-restart { padding: 14px 32px; border-radius: 100px; border: 1.5px solid var(--accent); background: transparent; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .btn-restart:hover { background: var(--accent); color: #0e0e0f; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 500px; transform: translateY(20px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
  .btn-modal-save { flex: 1; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #0e0e0f; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-modal-cancel { padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 12px 24px; font-size: 13px; color: var(--text-soft); transition: transform 0.3s ease; z-index: 100; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } .actions { flex-wrap: wrap; } .btn { max-width: none; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Học tiếng Việt</div>
    <h1>Mes <em>flashcards</em><br>vietnamiennes</h1>
    <p class="subtitle">Répétition espacée · Audio natif · Synchronisé</p>
  </header>
  <div class="sync-bar">
    <div class="sync-dot syncing" id="sync-dot"></div>
    <span id="sync-label">Connexion...</span>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('study', this)">Étudier</button>
    <button class="nav-tab" onclick="switchView('manage', this)">Mes mots</button>
    <button class="nav-tab" onclick="switchView('categories', this)">Catégories</button>
  </nav>

  <div class="view active" id="view-study">
    <div class="controls" id="mode-controls">
      <button class="toggle-btn active" id="btn-viet-fr" onclick="setMode('viet-fr')">🇻🇳 → 🇫🇷</button>
      <button class="toggle-btn" id="btn-fr-viet" onclick="setMode('fr-viet')">🇫🇷 → 🇻🇳</button>
      <button class="toggle-btn" id="btn-random" onclick="setMode('random')">Aléatoire</button>
    </div>
    <div class="controls" id="main-cat-filters"></div>
    <div class="controls" id="sub-cat-filters" style="margin-top:-16px;"></div>
    <div class="cat-breadcrumb" id="cat-breadcrumb"></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Connus</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">À revoir</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Restants</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text">0 / 0</div>
    </div>
    <div id="study-area"><div class="loading-screen"><div class="spinner"></div><p>Chargement...</p></div></div>
  </div>

  <div class="view" id="view-manage">
    <div class="add-section">
      <div class="section-sep" style="margin-bottom:24px"><div class="sep-line"></div><span>Ajouter un mot</span><div class="sep-line"></div></div>
      <div class="form-grid">
        <div class="form-group"><label>Vietnamien</label><input type="text" id="inp-viet" placeholder="xin chào" /></div>
        <div class="form-group"><label>Français</label><input type="text" id="inp-fr" placeholder="bonjour" /></div>
        <div class="form-group" style="grid-column:1/-1"><label>Romanisation (optionnel)</label><input type="text" id="inp-roman" placeholder="sin tchào" /></div>
      </div>
      <div class="form-group" style="margin-bottom:12px"><label>Catégorie principale</label><div class="cat-selector" id="main-cat-picker"></div></div>
      <div class="form-group" id="sub-cat-group" style="margin-bottom:16px;display:none"><label>Sous-catégorie</label><div class="cat-selector" id="sub-cat-picker"></div></div>
      <div class="form-row">
        <label class="audio-upload-label" for="audioFileInput">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>Audio natif
        </label>
        <input type="file" id="audioFileInput" accept="audio/*" onchange="handleAudioFile(this)" />
        <span class="audio-filename" id="audio-filename">Aucun fichier</span>
      </div>
      <button class="btn-add" onclick="addWord()">Ajouter la carte</button>
    </div>
    <div class="controls" style="justify-content:flex-start;margin-bottom:16px" id="manage-main-filters"></div>
    <div class="controls" style="justify-content:flex-start;margin-bottom:20px" id="manage-sub-filters"></div>
    <div class="section-sep"><div class="sep-line"></div><span>Mes cartes (<span id="word-count">0</span>)</span><div class="sep-line"></div></div>
    <div class="word-list" id="word-list"></div>
  </div>

  <div class="view" id="view-categories">
    <div class="cat-manager">
      <div class="section-sep" style="margin-bottom:20px"><div class="sep-line"></div><span>Gérer les catégories</span><div class="sep-line"></div></div>
      <div class="cat-tree" id="cat-tree"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Modifier la carte</div>
    <div class="form-grid">
      <div class="form-group"><label>Vietnamien</label><input type="text" id="edit-viet" /></div>
      <div class="form-group"><label>Français</label><input type="text" id="edit-fr" /></div>
      <div class="form-group" style="grid-column:1/-1"><label>Romanisation</label><input type="text" id="edit-roman" /></div>
    </div>
    <div class="form-group" style="margin-bottom:8px"><label>Catégorie principale</label><div class="cat-selector" id="edit-main-cat-picker"></div></div>
    <div class="form-group" id="edit-sub-cat-group" style="margin-bottom:16px;display:none"><label>Sous-catégorie</label><div class="cat-selector" id="edit-sub-cat-picker"></div></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeEditModal()">Annuler</button>
      <button class="btn-modal-save" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDeu2oIs5ZMhCniCuCZmG0tz1MT8p_-2ho",
  authDomain: "viet-flashcards.firebaseapp.com",
  projectId: "viet-flashcards",
  storageBucket: "viet-flashcards.firebasestorage.app",
  messagingSenderId: "764070119844",
  appId: "1:764070119844:web:0c9090dcaf6916a0929931"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const FIXED_CATS = ['verbes', 'phrases', 'vocabulaire'];
let categories = [];
let words = [];
let audioFiles = {};
let mode = 'viet-fr';
let activeCatMain = 'tout', activeCatSub = '';
let manageCatMain = 'tout', manageCatSub = '';
let selectedMainCat = '', selectedSubCat = '';
let editSelectedMain = '', editSelectedSub = '';
let deck = [], currentIndex = 0, correct = 0, wrong = 0;
let currentAudio = null, editingId = null, dbReady = false;

function setSyncStatus(s) {
  document.getElementById('sync-dot').className = 'sync-dot ' + s;
  document.getElementById('sync-label').textContent = s === 'ok' ? 'Synchronisé' : s === 'syncing' ? 'Synchronisation...' : 'Hors ligne';
}

// Listeners
onSnapshot(collection(db, 'words'), async snap => {
  if (snap.empty && !dbReady) {
    // Seed mots par défaut dans Firebase au premier lancement
    const defaults = [
      { viet: 'Xin chào', fr: 'Bonjour', roman: 'sin tchào', main: 'phrases', sub: '', audio: null, createdAt: Date.now() },
      { viet: 'Cảm ơn', fr: 'Merci', roman: 'gàm ơn', main: 'phrases', sub: '', audio: null, createdAt: Date.now() },
      { viet: 'Tạm biệt', fr: 'Au revoir', roman: 'tàm biệt', main: 'phrases', sub: '', audio: null, createdAt: Date.now() },
      { viet: 'Vâng', fr: 'Oui', roman: 'vâng', main: 'phrases', sub: '', audio: null, createdAt: Date.now() },
      { viet: 'Không', fr: 'Non', roman: 'khong', main: 'phrases', sub: '', audio: null, createdAt: Date.now() },
      { viet: 'Gia đình', fr: 'Famille', roman: 'gia dinh', main: 'vocabulaire', sub: 'famille', audio: null, createdAt: Date.now() },
      { viet: 'Mẹ', fr: 'Maman', roman: 'mè', main: 'vocabulaire', sub: 'famille', audio: null, createdAt: Date.now() },
      { viet: 'Bố', fr: 'Papa', roman: 'bố', main: 'vocabulaire', sub: 'famille', audio: null, createdAt: Date.now() },
      { viet: 'Ăn', fr: 'Manger', roman: 'ăn', main: 'verbes', sub: '', audio: null, createdAt: Date.now() },
      { viet: 'Uống', fr: 'Boire', roman: 'uống', main: 'verbes', sub: '', audio: null, createdAt: Date.now() },
    ];
    for (const w of defaults) await addDoc(collection(db, 'words'), w);
    return;
  }
  words = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
  dbReady = true;
  setSyncStatus('ok');
  renderAll();
}, () => setSyncStatus('error'));

onSnapshot(collection(db, 'categories'), async snap => {
  if (snap.empty) {
    const defaults = [
      { main: 'verbes', subs: [] },
      { main: 'phrases', subs: [] },
      { main: 'vocabulaire', subs: ['famille', 'nourriture', 'couleurs', 'chiffres'] }
    ];
    for (const c of defaults) await setDoc(doc(db, 'categories', c.main), c);
    return;
  }
  categories = snap.docs.map(d => d.data());
  categories.sort((a, b) => FIXED_CATS.indexOf(a.main) - FIXED_CATS.indexOf(b.main));
  renderAll();
});

function renderAll() {
  if (!dbReady) return;
  renderStudyCatFilters();
  startSession();
  renderWordList();
  updateWordCount();
  renderMainCatPicker();
  renderManageCatFilters();
  if (document.getElementById('view-categories').classList.contains('active')) renderCatTree();
}

// Nav
window.switchView = (v, el) => {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  el.classList.add('active');
  if (v === 'study') { renderStudyCatFilters(); startSession(); }
  if (v === 'manage') { renderManageCatFilters(); renderWordList(); renderMainCatPicker(); }
  if (v === 'categories') renderCatTree();
};

// Mode
window.setMode = m => {
  mode = m;
  document.querySelectorAll('#mode-controls .toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  startSession();
};

// Study filters
function renderStudyCatFilters() {
  const mainEl = document.getElementById('main-cat-filters');
  if (!mainEl) return;
  mainEl.innerHTML = ['tout', ...categories.map(c => c.main)].map(m =>
    `<button class="toggle-btn ${activeCatMain === m ? 'active' : ''}" onclick="setStudyMain('${m}')">${m === 'tout' ? 'Tout' : m}</button>`).join('');
  const subEl = document.getElementById('sub-cat-filters');
  const catObj = categories.find(c => c.main === activeCatMain);
  subEl.innerHTML = catObj && catObj.subs.length > 0
    ? ['tout', ...catObj.subs].map(s =>
        `<button class="toggle-btn sub ${(s === 'tout' && !activeCatSub) || activeCatSub === s ? 'active' : ''}" onclick="setStudySub('${s}')">${s === 'tout' ? 'Toutes' : s}</button>`).join('')
    : '';
  const bc = document.getElementById('cat-breadcrumb');
  bc.innerHTML = activeCatMain === 'tout' ? '' :
    `<span>${activeCatMain}</span>` + (activeCatSub ? `<span style="opacity:.4">›</span><span>${activeCatSub}</span>` : '');
}
window.setStudyMain = m => { activeCatMain = m; activeCatSub = ''; renderStudyCatFilters(); startSession(); };
window.setStudySub = s => { activeCatSub = s === 'tout' ? '' : s; renderStudyCatFilters(); startSession(); };

// Session
function getFiltered() {
  return words.filter(w => {
    if (activeCatMain === 'tout') return true;
    if (w.main !== activeCatMain) return false;
    if (activeCatSub && w.sub !== activeCatSub) return false;
    return true;
  });
}
function startSession() {
  deck = shuffle([...getFiltered()]);
  currentIndex = 0; correct = 0; wrong = 0;
  updateStats(); renderCard();
}
window.startSession = startSession;
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
  return arr;
}
function updateStats() {
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-remaining').textContent = Math.max(0, deck.length - currentIndex);
  const pct = deck.length ? Math.round((currentIndex / deck.length) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = currentIndex + ' / ' + deck.length;
}
function renderCard() {
  const area = document.getElementById('study-area');
  if (!area) return;
  if (!dbReady) { area.innerHTML = `<div class="loading-screen"><div class="spinner"></div><p>Chargement...</p></div>`; return; }
  if (!deck.length) { area.innerHTML = `<div class="empty-card"><p>Aucun mot ici.<br>Ajoute des mots dans <strong>Mes mots</strong>.</p></div>`; return; }
  if (currentIndex >= deck.length) { area.innerHTML = `<div class="completed"><h2>Terminé !</h2><p>${correct} connus · ${wrong} à revoir</p><button class="btn-restart" onclick="startSession()">Recommencer</button></div>`; return; }
  const w = deck[currentIndex];
  const em = mode === 'random' ? (Math.random() > 0.5 ? 'viet-fr' : 'fr-viet') : mode;
  const sv = em === 'viet-fr';
  const cat = w.sub ? `${w.main} › ${w.sub}` : w.main;
  const safe = (w.viet || '').replace(/'/g, "\\'");
  area.innerHTML = `
    <div class="card-area"><div class="card" id="flashcard" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-lang-badge ${sv ? 'badge-viet' : 'badge-fr'}">${sv ? 'Vietnamien' : 'Français'}</div>
        <div class="card-word">${sv ? w.viet : w.fr}</div>
        ${sv && w.roman ? `<div class="card-romanization">${w.roman}</div>` : ''}
        <div class="card-category">${cat}</div>
        <button class="audio-btn" id="play-btn" onclick="playAudio(event,'${w._id}','${safe}')">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>Écouter
        </button>
        <div class="card-hint">Cliquer pour retourner</div>
      </div>
      <div class="card-face card-back">
        <div class="card-lang-badge ${sv ? 'badge-fr' : 'badge-viet'}">${sv ? 'Français' : 'Vietnamien'}</div>
        <div class="card-word">${sv ? w.fr : w.viet}</div>
        ${!sv && w.roman ? `<div class="card-romanization">${w.roman}</div>` : ''}
        <div class="card-hint">Comment tu t'en es sorti ?</div>
      </div>
    </div></div>
    <div class="actions">
      <button class="btn btn-wrong" onclick="answer(false)">✗ À revoir</button>
      <button class="btn btn-skip" onclick="answer(null)">→ Passer</button>
      <button class="btn btn-correct" onclick="answer(true)">✓ Connu</button>
    </div>`;
}
window.flipCard = () => document.getElementById('flashcard').classList.toggle('flipped');
window.answer = result => { if (result === true) correct++; else if (result === false) wrong++; currentIndex++; updateStats(); renderCard(); };

// Audio
window.playAudio = (e, id, text) => {
  e.stopPropagation();
  const btn = document.getElementById('play-btn');
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = audioFiles[id] ? new Audio(audioFiles[id]) : new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=vi&client=tw-ob`);
  if (btn) btn.classList.add('playing');
  currentAudio.play().catch(() => { const u = new SpeechSynthesisUtterance(text); u.lang = 'vi-VN'; speechSynthesis.speak(u); });
  currentAudio.onended = () => { if (btn) btn.classList.remove('playing'); };
};
window.playWordAudio = (id, text) => {
  if (currentAudio) currentAudio.pause();
  if (audioFiles[id]) { currentAudio = new Audio(audioFiles[id]); currentAudio.play(); }
  else { const u = new SpeechSynthesisUtterance(text); u.lang = 'vi-VN'; speechSynthesis.speak(u); }
};
window.handleAudioFile = input => {
  const f = input.files[0]; if (!f) return;
  document.getElementById('audio-filename').textContent = f.name;
  window._pendingAudioFile = f; window._pendingAudioName = f.name;
};

// Manage filters
function renderManageCatFilters() {
  const mainEl = document.getElementById('manage-main-filters'); if (!mainEl) return;
  mainEl.innerHTML = ['tout', ...categories.map(c => c.main)].map(m =>
    `<button class="toggle-btn ${manageCatMain === m ? 'active' : ''}" onclick="setManageMain('${m}')">${m === 'tout' ? 'Tout' : m}</button>`).join('');
  const subEl = document.getElementById('manage-sub-filters');
  const catObj = categories.find(c => c.main === manageCatMain);
  subEl.innerHTML = catObj && catObj.subs.length > 0
    ? ['tout', ...catObj.subs].map(s =>
        `<button class="toggle-btn sub ${(s === 'tout' && !manageCatSub) || manageCatSub === s ? 'active' : ''}" onclick="setManageSub('${s}')">${s === 'tout' ? 'Toutes' : s}</button>`).join('')
    : '';
}
window.setManageMain = m => { manageCatMain = m; manageCatSub = ''; renderManageCatFilters(); renderWordList(); };
window.setManageSub = s => { manageCatSub = s === 'tout' ? '' : s; renderManageCatFilters(); renderWordList(); };

// Cat picker
function renderMainCatPicker(sel) {
  sel = sel !== undefined ? sel : selectedMainCat;
  const el = document.getElementById('main-cat-picker'); if (!el) return;
  el.innerHTML = categories.map(c => `<button class="cat-pill ${sel === c.main ? 'selected' : ''}" onclick="pickMainCat('${c.main}')">${c.main}</button>`).join('');
}
window.pickMainCat = m => {
  selectedMainCat = m; selectedSubCat = ''; renderMainCatPicker(m);
  const catObj = categories.find(c => c.main === m);
  const grp = document.getElementById('sub-cat-group');
  const sp = document.getElementById('sub-cat-picker');
  if (catObj && catObj.subs.length > 0) {
    grp.style.display = '';
    sp.innerHTML = catObj.subs.map(s => `<button class="cat-pill" onclick="pickSubCat('${s}')">${s}</button>`).join('');
  } else { grp.style.display = 'none'; sp.innerHTML = ''; }
};
window.pickSubCat = s => {
  selectedSubCat = s;
  document.getElementById('sub-cat-picker').querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('selected', p.textContent.trim() === s));
};

// Add word
window.addWord = async () => {
  const viet = document.getElementById('inp-viet').value.trim();
  const fr = document.getElementById('inp-fr').value.trim();
  const roman = document.getElementById('inp-roman').value.trim();
  if (!viet || !fr) { showToast('Remplis au moins le vietnamien et le français'); return; }
  if (!selectedMainCat) { showToast('Choisis une catégorie'); return; }
  setSyncStatus('syncing');
  const ref = await addDoc(collection(db, 'words'), { viet, fr, roman, main: selectedMainCat, sub: selectedSubCat, audio: null, createdAt: Date.now() });
  if (window._pendingAudioFile) {
    const reader = new FileReader();
    reader.onload = e => { audioFiles[ref.id] = e.target.result; };
    reader.readAsDataURL(window._pendingAudioFile);
    window._pendingAudioFile = null; window._pendingAudioName = null;
  }
  ['inp-viet','inp-fr','inp-roman'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('audio-filename').textContent = 'Aucun fichier';
  document.getElementById('audioFileInput').value = '';
  selectedMainCat = ''; selectedSubCat = '';
  renderMainCatPicker('');
  document.getElementById('sub-cat-group').style.display = 'none';
  showToast('Carte ajoutée !');
};

// Word list
function renderWordList() {
  const filtered = words.filter(w => {
    if (manageCatMain === 'tout') return true;
    if (w.main !== manageCatMain) return false;
    if (manageCatSub && w.sub !== manageCatSub) return false;
    return true;
  });
  const list = document.getElementById('word-list'); if (!list) return;
  if (!filtered.length) { list.innerHTML = '<div class="empty-card"><p>Aucune carte ici.</p></div>'; updateWordCount(); return; }
  list.innerHTML = filtered.map(w => {
    const cat = w.sub ? `${w.main} › ${w.sub}` : w.main;
    const safe = (w.viet || '').replace(/'/g, "\\'");
    return `<div class="word-item">
      <div class="word-viet">${w.viet}</div>
      <div class="word-fr">${w.fr}</div>
      <div class="word-cat">${cat}</div>
      <div class="word-actions">
        <button class="word-btn" onclick="playWordAudio('${w._id}','${safe}')"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
        <button class="word-btn" onclick="openEditModal('${w._id}')"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
        <button class="word-btn delete" onclick="deleteWord('${w._id}')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
    </div>`;}).join('');
  updateWordCount();
}
function updateWordCount() { const el = document.getElementById('word-count'); if (el) el.textContent = words.length; }
window.deleteWord = async id => { setSyncStatus('syncing'); await deleteDoc(doc(db, 'words', id)); delete audioFiles[id]; showToast('Carte supprimée'); };

// Edit modal
window.openEditModal = id => {
  const w = words.find(x => x._id === id); if (!w) return;
  editingId = id; editSelectedMain = w.main; editSelectedSub = w.sub || '';
  document.getElementById('edit-viet').value = w.viet;
  document.getElementById('edit-fr').value = w.fr;
  document.getElementById('edit-roman').value = w.roman || '';
  renderEditPicker(editSelectedMain);
  document.getElementById('edit-modal').classList.add('open');
};
function renderEditPicker(sel) {
  document.getElementById('edit-main-cat-picker').innerHTML = categories.map(c =>
    `<button class="cat-pill ${sel === c.main ? 'selected' : ''}" onclick="editPickMain('${c.main}')">${c.main}</button>`).join('');
  renderEditSubs(sel);
}
function renderEditSubs(main) {
  const catObj = categories.find(c => c.main === main);
  const grp = document.getElementById('edit-sub-cat-group');
  const el = document.getElementById('edit-sub-cat-picker');
  if (catObj && catObj.subs.length > 0) {
    grp.style.display = '';
    el.innerHTML = catObj.subs.map(s => `<button class="cat-pill ${editSelectedSub === s ? 'selected' : ''}" onclick="editPickSub('${s}')">${s}</button>`).join('');
  } else { grp.style.display = 'none'; el.innerHTML = ''; }
}
window.editPickMain = m => { editSelectedMain = m; editSelectedSub = ''; renderEditPicker(m); };
window.editPickSub = s => { editSelectedSub = s; document.getElementById('edit-sub-cat-picker').querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('selected', p.textContent.trim() === s)); };
window.closeEditModal = () => { document.getElementById('edit-modal').classList.remove('open'); editingId = null; };
window.saveEdit = async () => {
  if (!editingId) return;
  setSyncStatus('syncing');
  await updateDoc(doc(db, 'words', editingId), {
    viet: document.getElementById('edit-viet').value.trim(),
    fr: document.getElementById('edit-fr').value.trim(),
    roman: document.getElementById('edit-roman').value.trim(),
    main: editSelectedMain, sub: editSelectedSub
  });
  window.closeEditModal(); showToast('Carte modifiée !');
};

// Cat tree
function renderCatTree() {
  const tree = document.getElementById('cat-tree'); if (!tree) return;
  tree.innerHTML = categories.map(c => `
    <div class="cat-main-row">
      <div class="cat-main-label">${c.main}</div>
      <div class="cat-subs">
        ${c.subs.map(s => `<div class="sub-tag">${s}<button onclick="deleteSub('${c.main}','${s}')">×</button></div>`).join('')}
        ${c.main === 'vocabulaire'
          ? `<div class="add-sub-inline"><input type="text" id="new-sub-${c.main}" placeholder="nouvelle sous-cat..." onkeydown="if(event.key==='Enter')addSub('${c.main}')"/><button onclick="addSub('${c.main}')">+ Ajouter</button></div>`
          : `<span style="font-size:12px;color:var(--text-muted);font-style:italic">Pas de sous-catégories</span>`}
      </div>
    </div>
    <div style="height:1px;background:var(--border);margin:4px 0"></div>`).join('');
}
window.addSub = async main => {
  const input = document.getElementById(`new-sub-${main}`);
  const val = input.value.trim().toLowerCase(); if (!val) return;
  const cat = categories.find(c => c.main === main);
  if (!cat || cat.subs.includes(val)) { showToast('Existe déjà'); return; }
  setSyncStatus('syncing');
  await updateDoc(doc(db, 'categories', main), { subs: [...cat.subs, val] });
  input.value = ''; showToast(`"${val}" ajoutée`);
};
window.deleteSub = async (main, sub) => {
  const cat = categories.find(c => c.main === main); if (!cat) return;
  setSyncStatus('syncing');
  await updateDoc(doc(db, 'categories', main), { subs: cat.subs.filter(s => s !== sub) });
  const affected = words.filter(w => w.main === main && w.sub === sub);
  for (const w of affected) await updateDoc(doc(db, 'words', w._id), { sub: '' });
  showToast(`"${sub}" supprimée`);
};

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
